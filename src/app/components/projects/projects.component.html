<section class="projects" id="projects">
  <div class="projects-header">
    <h2 class="section-title">Mis Proyectos</h2>
    <p class="subtitle">Arquitecturas robustas y soluciones escalables llevadas a la realidad.</p>
  </div>

  <div class="project-list">
    <article class="project-card" *ngFor="let project of projects">
      
      <div class="img-container">
        <img [src]="project.image" [alt]="project.title" class="project-img" />
      </div>

      <div class="project-content">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        

        <div class="tags">
          <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
        </div>
      </div>

      <div class="project-actions">
        <a [href]="project.link" target="_blank" class="btn-primary">
          {{ project.link.includes('github.com') ? 'Ver Código' : 'Visitar Web' }}
        </a>
      </div>
      
    </article>
  </div>
</section>
